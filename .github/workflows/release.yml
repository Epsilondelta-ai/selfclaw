name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: selfclaw-${{ github.ref_name }}-linux-x86_64.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: selfclaw-${{ github.ref_name }}-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: selfclaw-${{ github.ref_name }}-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: selfclaw-${{ github.ref_name }}-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} selfclaw
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  # Build .deb package for Debian/Ubuntu
  package-deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: selfclaw-${{ github.ref_name }}-linux-x86_64.tar.gz
          path: .

      - name: Extract binary
        run: tar xzf selfclaw-${{ github.ref_name }}-linux-x86_64.tar.gz

      - name: Build .deb
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_DIR="selfclaw_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"

          cp selfclaw "${PKG_DIR}/usr/bin/selfclaw"
          chmod 755 "${PKG_DIR}/usr/bin/selfclaw"

          cat > "${PKG_DIR}/DEBIAN/control" <<CTRL
          Package: selfclaw
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Epsilondelta-ai <contact@epsilondelta.ai>
          Description: Fully autonomous AI agent that discovers its own purpose
           SelfClaw is a fully autonomous AI agent that discovers its own reason for
           existence. It operates without human instruction by default.
          Homepage: https://github.com/Epsilondelta-ai/selfclaw
          CTRL

          cat > "${PKG_DIR}/DEBIAN/postinst" <<'POSTINST'
          #!/bin/sh
          set -e
          echo ""
          echo "SelfClaw installed! Run 'selfclaw onboard' to get started."
          echo ""
          POSTINST
          chmod 755 "${PKG_DIR}/DEBIAN/postinst"

          dpkg-deb --build "${PKG_DIR}"
          mv "${PKG_DIR}.deb" "selfclaw_${VERSION}_amd64.deb"

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: selfclaw-${{ github.ref_name }}-amd64.deb
          path: "*.deb"

  # Build .rpm package for Fedora/RHEL/CentOS
  package-rpm:
    name: Build .rpm package
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install rpm tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Download Linux x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: selfclaw-${{ github.ref_name }}-linux-x86_64.tar.gz
          path: .

      - name: Extract binary
        run: tar xzf selfclaw-${{ github.ref_name }}-linux-x86_64.tar.gz

      - name: Build .rpm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          # Create source tarball
          mkdir -p "selfclaw-${VERSION}"
          cp selfclaw "selfclaw-${VERSION}/"
          tar czf "rpmbuild/SOURCES/selfclaw-${VERSION}.tar.gz" "selfclaw-${VERSION}"

          cat > rpmbuild/SPECS/selfclaw.spec <<SPEC
          Name:    selfclaw
          Version: ${VERSION}
          Release: 1
          Summary: Fully autonomous AI agent that discovers its own purpose
          License: MIT
          URL:     https://github.com/Epsilondelta-ai/selfclaw
          Source0: selfclaw-${VERSION}.tar.gz

          %description
          SelfClaw is a fully autonomous AI agent that discovers its own reason
          for existence. It operates without human instruction by default.

          %prep
          %setup -q

          %install
          mkdir -p %{buildroot}/usr/bin
          install -m 755 selfclaw %{buildroot}/usr/bin/selfclaw

          %post
          echo ""
          echo "SelfClaw installed! Run 'selfclaw onboard' to get started."
          echo ""

          %files
          /usr/bin/selfclaw
          SPEC

          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/selfclaw.spec
          cp rpmbuild/RPMS/x86_64/*.rpm . || cp rpmbuild/RPMS/noarch/*.rpm . || true

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: selfclaw-${{ github.ref_name }}-x86_64.rpm
          path: "*.rpm"

  release:
    name: Create Release
    needs: [build, package-deb, package-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.deb
            artifacts/**/*.rpm

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test
